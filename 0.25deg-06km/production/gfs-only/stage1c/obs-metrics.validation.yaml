forecast_path: ${SCRATCH}/nested-eagle/0.25deg-06km/production/gfs-only/stage1c/inference-validation
output_path: ${SCRATCH}/nested-eagle/0.25deg-06km/production/gfs-only/stage1c/inference-validation/obs-metrics
log_path: eagle-logs/obs_metrics/validation
lead_time: 360
use_mpi: True

model_type: global
vars_of_interest:
  - gh
  - u
  - v
  - t
  - q
  - sp
  - u10
  - v10
  - t2m
  - sh2
  # quantities that obs-metrics can derive
  - wind_speed
  - 10m_wind_speed

levels:
  - 100
  - 250
  - 500
  - 850

temporal_window: 30min
max_qc_value: 2

subregions:
  conus:
    longitude: [225, 310]
    latitude: [20, 55]
  europe:
    longitude: [-25, 65]
    latitude: [35, 75]
  tropics:
    latitude: [-20, 20]
  northern_hemisphere:
    latitude: [20, 80]
  southern_hemisphere:
    latitude: [-80, -20]
  polar_north:
    latitude: [60, 90]
  polar_south:
    latitude: [-90, -60]

start_date: 2023-02-01T06
end_date: 2024-01-31T18
freq: 30h
