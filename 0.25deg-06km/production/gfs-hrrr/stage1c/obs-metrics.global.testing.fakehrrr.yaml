forecast_path: ${SCRATCH}/nested-eagle/0.25deg-06km/production/gfs-hrrr/stage1c/inference-testing-fakehrrr
output_path: ${SCRATCH}/nested-eagle/0.25deg-06km/production/gfs-hrrr/stage1c/inference-testing-fakehrrr/obs-metrics
lead_time: 360
use_mpi: True

model_type: nested-global
lam_index: 407040
lcc_info:
  n_x: 848
  n_y: 480

anemoi_reference_dataset_kwargs:
  cutout:
    - dataset: /pscratch/sd/t/timothys/nested-eagle/0.25deg-06km/data/gfs.as.hrrr.zarr
      trim_edge: [25, 24, 25, 26]
    - dataset: /pscratch/sd/t/timothys/nested-eagle/0.25deg-06km/data/gfs.zarr
  adjust: all
  min_distance_km: 6

forecast_regrid_kwargs:
  target_grid_path: ${SCRATCH}/nested-eagle/0.25deg-06km/mesh-gen/csmswt-trim25/global_quarter_degree_with_mask.nc
  regridder_kwargs:
    method: conservative_normed
    reuse_weights: True
    filename: ${SCRATCH}/nested-eagle/0.25deg-06km/mesh-gen/csmswt-trim25/conservative_lam_to_global.nc

vars_of_interest:
  - gh
  - u
  - v
  - t
  - q
  - sp
  - u10
  - v10
  - t2m
  - sh2
  # quantities that obs-metrics can derive
  - wind_speed
  - 10m_wind_speed

levels:
  - 100
  - 250
  - 500
  - 850

temporal_window: 30min
max_qc_value: 2

subregions:
  conus:
    longitude: [225, 310]
    latitude: [20, 55]
  europe:
    longitude: [-25, 65]
    latitude: [35, 75]
  tropics:
    latitude: [-20, 20]
  northern_hemisphere:
    latitude: [20, 80]
  southern_hemisphere:
    latitude: [-80, -20]
  polar_north:
    latitude: [60, 90]
  polar_south:
    latitude: [-90, -60]


start_date: 2024-02-01T06
end_date: 2025-01-31T18
freq: 30h
