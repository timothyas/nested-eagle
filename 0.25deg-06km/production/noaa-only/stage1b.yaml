data:
  format: zarr
  frequency: 6h
  timestep: 6h
  datasets:
    data:
      forcing:
      - cos_latitude
      - sin_latitude
      - cos_longitude
      - sin_longitude
      - cos_julian_day
      - sin_julian_day
      - cos_local_time
      - sin_local_time
      - insolation
      - lsm
      - orog
      diagnostic:
      - accum_tp
      - u80
      - v80
      processors:
        normalizer:
          _target_: anemoi.models.preprocessing.normalizer.InputNormalizer
          config:
            default: mean-std
            std:
            - accum_tp
            - sh2
            - q_100
            - q_150
            - q_200
            - q_250
            - q_300
            - q_400
            - q_500
            - q_600
            - q_700
            - q_850
            - q_925
            - q_1000
            min-max: null
            max:
            - orog
            none:
            - cos_latitude
            - sin_latitude
            - cos_longitude
            - sin_longitude
            - cos_julian_day
            - sin_julian_day
            - cos_local_time
            - sin_local_time
            - insolation
            - lsm
  num_features: null
dataloader:
  prefetch_factor: 1
  pin_memory: true
  read_group_size: ${system.hardware.num_gpus_per_model}
  num_workers:
    training: 8
    validation: 8
    test: 1
  batch_size:
    training: 1
    validation: 1
    test: 1
  limit_batches:
    training: null
    validation: null
    test: 1
  grid_indices:
    datasets:
      data:
        _target_: anemoi.training.data.grid_indices.FullGrid
        nodes_name: ${graph.data}
  dataset:
    cutout:
    - dataset: ${system.input.lam_dataset}
      trim_edge:
      - 25
      - 24
      - 25
      - 26
    - dataset: ${system.input.global_dataset}
    adjust: all
    min_distance_km: 6
  model_run_info: null
  training:
    datasets:
      data:
        dataset: ${dataloader.dataset}
        start: '2015-02-01'
        end: '2023-01-31'
        frequency: ${data.frequency}
        drop: []
        trajectory: ${dataloader.model_run_info}
  validation_rollout: 1
  validation:
    datasets:
      data:
        dataset: ${dataloader.dataset}
        start: '2023-02-01'
        end: '2024-01-31'
        frequency: ${data.frequency}
        drop: []
        trajectory: ${dataloader.model_run_info}
  test:
    datasets:
      data:
        dataset: ${dataloader.dataset}
        start: '2023-02-01'
        end: '2024-01-31'
        frequency: ${data.frequency}
        drop: []
        trajectory: ${dataloader.model_run_info}
diagnostics:
  plot:
    asynchronous: true
    datashader: true
    frequency:
      batch: 300000
      epoch: 500
    parameters: []
    sample_idx: 0
    precip_and_related_fields: []
    colormaps:
      default:
        _target_: anemoi.training.utils.custom_colormaps.MatplotlibColormap
        name: viridis
      error:
        _target_: anemoi.training.utils.custom_colormaps.MatplotlibColormap
        name: bwr
      precip:
        _target_: anemoi.training.utils.custom_colormaps.MatplotlibColormapClevels
        clevels:
        - '#ffffff'
        - '#04e9e7'
        - '#019ff4'
        - '#0300f4'
        - '#02fd02'
        - '#01c501'
        - '#008e00'
        - '#fdf802'
        - '#e5bc00'
        - '#fd9500'
        - '#fd0000'
        - '#d40000'
        - '#bc0000'
        - '#f800fd'
        variables: ${diagnostics.plot.precip_and_related_fields}
    datasets_to_plot:
    - data
    callbacks: []
  callbacks: []
  benchmark_profiler:
    memory:
      enabled: true
      steps: 5
      warmup: 2
      extra_plots: false
      trace_rank0_only: false
    time:
      enabled: true
      verbose: false
    speed:
      enabled: true
    system:
      enabled: true
    model_summary:
      enabled: true
    snapshot:
      enabled: true
      steps: 4
      warmup: 0
  debug:
    anomaly_detection: false
  enable_checkpointing: true
  checkpoint:
    every_n_minutes:
      save_frequency: null
      num_models_saved: 0
    every_n_epochs:
      save_frequency: 1
      num_models_saved: -1
    every_n_train_steps:
      save_frequency: null
      num_models_saved: 0
  log:
    wandb:
      enabled: false
      offline: false
      log_model: false
      project: Anemoi
      entity: null
      gradients: false
      parameters: false
    tensorboard:
      enabled: false
    mlflow:
      enabled: true
      _target_: anemoi.training.diagnostics.mlflow.logger.AnemoiMLflowLogger
      offline: true
      authentication: false
      tracking_uri: null
      experiment_name: 0.25deg-06km production noaa-only stage1b
      project_name: Nested-EAGLE
      system: true
      terminal: true
      run_name: null
      on_resume_create_child: true
      expand_hyperparams:
      - config
      http_max_retries: 35
      max_params_length: 2000
      save_dir: ${system.output.logs.mlflow}
      log_model: false
    interval: 100
  enable_progress_bar: true
  progress_bar:
    _target_: pytorch_lightning.callbacks.TQDMProgressBar
    refresh_rate: 1
  check_val_every_n_epoch: 1
  print_memory_summary: false
system:
  output:
    root: ${oc.decode:${oc.env:SCRATCH}}/nested-eagle/0.25deg-06km/production/noaa-only/stage1b/
    logs:
      root: logs
      wandb: wandb
      mlflow: ${oc.decode:${oc.env:SCRATCH}}/nested-eagle/0.25deg-06km/production/noaa-only/stage1a/logs/mlflow/
      tensorboard: tensorboard
    checkpoints:
      root: checkpoint
      every_n_epochs: anemoi-by_epoch-epoch_{epoch:03d}-step_{step:06d}
      every_n_train_steps: anemoi-by_step-epoch_{epoch:03d}-step_{step:06d}
      every_n_minutes: anemoi-by_time-epoch_{epoch:03d}-step_{step:06d}
    plots: plots
    profiler: profiler
  input:
    dataset: null
    mesh_dir: ${oc.decode:${oc.env:SCRATCH}}/nested-eagle/0.25deg-06km/mesh-gen/o96-trim25
    graph: ${system.input.mesh_dir}/graph.cut084-13.nn0532.pt
    truncation: null
    truncation_inv: null
    loss_matrices_path: null
    warm_start: ${oc.decode:${oc.env:SCRATCH}}/nested-eagle/0.25deg-06km/production/noaa-only/stage1a/checkpoint/1e54fd8d071a4ccd8e68cc3d3c6ac439/last.ckpt
    lam_dataset: ${oc.decode:${oc.env:SCRATCH}}/nested-eagle/0.25deg-06km/data/hrrr.zarr
    global_dataset: ${oc.decode:${oc.env:SCRATCH}}/nested-eagle/0.25deg-06km/data/gfs.zarr
    latent_mesh: ${system.input.mesh_dir}/latent.o96.spongex1.combined.sorted.npz
  hardware:
    accelerator: auto
    num_gpus_per_node: ${oc.decode:${oc.env:SLURM_GPUS_PER_NODE}}
    num_nodes: ${oc.decode:${oc.env:SLURM_NNODES}}
    num_gpus_per_model: 4
graph:
  overwrite: false
  data: data
  hidden: hidden
  nodes:
    data:
      node_builder:
        _target_: anemoi.graphs.nodes.AnemoiDatasetNodes
        dataset: ${dataloader.dataset}
      attributes: ${graph.attributes.nodes}
    hidden:
      node_builder:
        _target_: anemoi.graphs.nodes.NPZFileNodes
        npz_file: ${system.input.latent_mesh}
        lat_key: lat
        lon_key: lon
  edges:
  - source_name: ${graph.data}
    target_name: ${graph.hidden}
    edge_builders:
    - _target_: anemoi.graphs.edges.CutOffEdges
      cutoff_distance_km: 84
      max_num_neighbours: 532
      source_mask_attr_name: null
      target_mask_attr_name: null
    attributes: ${graph.attributes.edges}
  - source_name: ${graph.hidden}
    target_name: ${graph.data}
    edge_builders:
    - _target_: anemoi.graphs.edges.KNNEdges
      num_nearest_neighbours: 3
      source_mask_attr_name: null
      target_mask_attr_name: null
    attributes: ${graph.attributes.edges}
  attributes:
    nodes:
      area_weight:
        _target_: anemoi.graphs.nodes.attributes.SphericalAreaWeights
        norm: unit-max
        fill_value: 0
      cutout_mask:
        _target_: anemoi.graphs.nodes.attributes.CutOutMask
      boundary_mask:
        _target_: anemoi.graphs.nodes.attributes.BooleanNot
        masks:
          _target_: anemoi.graphs.nodes.attributes.CutOutMask
      lam_area_weight:
        _target_: anemoi.graphs.nodes.attributes.MaskedPlanarAreaWeights
        mask_node_attr_name: cutout_mask
        norm: unit-max
    edges:
      edge_length:
        _target_: anemoi.graphs.edges.attributes.EdgeLength
        norm: unit-max
      edge_dirs:
        _target_: anemoi.graphs.edges.attributes.EdgeDirection
        norm: unit-std
  post_processors:
  - _target_: anemoi.graphs.processors.RestrictEdgeLength
    source_name: data
    target_name: hidden
    max_length_km: 18
    source_mask_attr_name: cutout_mask
model:
  num_channels: 512
  cpu_offload: false
  keep_batch_sharded: true
  model:
    _target_: anemoi.models.models.AnemoiModelEncProcDec
  layer_kernels:
    LayerNorm:
      _target_: torch.nn.LayerNorm
    Linear:
      _target_: torch.nn.Linear
    Activation:
      _target_: torch.nn.GELU
    QueryNorm:
      _target_: anemoi.models.layers.normalization.AutocastLayerNorm
      bias: false
    KeyNorm:
      _target_: anemoi.models.layers.normalization.AutocastLayerNorm
      bias: false
  processor:
    _target_: anemoi.models.layers.processor.TransformerProcessor
    num_layers: 16
    num_chunks: 1
    mlp_hidden_ratio: 4
    num_heads: 16
    window_size: 8168
    dropout_p: 0.0
    attention_implementation: flash_attention
    qk_norm: false
    softcap: 0.0
    use_alibi_slopes: false
    cpu_offload: ${model.cpu_offload}
    use_rotary_embeddings: false
    layer_kernels: ${model.layer_kernels}
  encoder:
    _target_: anemoi.models.layers.mapper.GraphTransformerForwardMapper
    trainable_size: ${model.trainable_parameters.data2hidden}
    sub_graph_edge_attributes: ${model.attributes.edges}
    num_chunks: 1
    mlp_hidden_ratio: 4
    num_heads: 16
    qk_norm: false
    cpu_offload: ${model.cpu_offload}
    layer_kernels: ${model.layer_kernels}
    shard_strategy: edges
    graph_attention_backend: triton
  decoder:
    _target_: anemoi.models.layers.mapper.GraphTransformerBackwardMapper
    trainable_size: ${model.trainable_parameters.hidden2data}
    sub_graph_edge_attributes: ${model.attributes.edges}
    num_chunks: 1
    mlp_hidden_ratio: 4
    num_heads: 16
    initialise_data_extractor_zero: false
    qk_norm: false
    cpu_offload: ${model.cpu_offload}
    layer_kernels: ${model.layer_kernels}
    shard_strategy: edges
    graph_attention_backend: triton
  residual:
    _target_: anemoi.models.layers.residual.SkipConnection
    step: -1
  output_mask:
    _target_: anemoi.training.utils.masks.NoOutputMask
  trainable_parameters:
    data: 8
    hidden: 8
    data2hidden: 8
    hidden2data: 8
  attributes:
    edges:
    - edge_length
    - edge_dirs
    nodes: []
  compile:
  - module: anemoi.models.layers.conv.GraphTransformerConv
  bounding:
  - _target_: anemoi.models.layers.bounding.ReluBounding
    variables:
    - accum_tp
    - sh2
    - q_100
    - q_150
    - q_200
    - q_250
    - q_300
    - q_400
    - q_500
    - q_600
    - q_700
    - q_850
    - q_925
    - q_1000
training:
  scalers:
    datasets:
      data:
        general_variable:
          _target_: anemoi.training.losses.scalers.GeneralVariableLossScaler
          weights:
            default: 1
            q: 0.6
            t: 6
            u: 0.8
            v: 0.5
            w: 0.001
            z: 12
            sp: 10
            10u: 0.1
            10v: 0.1
            2d: 0.5
            tp: 0.025
            cp: 0.0025
            gh: 12
            u10: 0.1
            v10: 0.1
            accum_tp: 0.025
        pressure_level:
          _target_: anemoi.training.losses.scalers.ReluVariableLevelScaler
          group: pl
          y_intercept: 0.2
          slope: 0.001
        nan_mask_weights:
          _target_: anemoi.training.losses.scalers.NaNMaskScaler
        stdev_tendency:
          _target_: anemoi.training.losses.scalers.StdevTendencyScaler
        var_tendency:
          _target_: anemoi.training.losses.scalers.VarTendencyScaler
        node_weights:
          _target_: anemoi.training.losses.scalers.ReweightedGraphNodeAttributeScaler
          nodes_name: ${graph.data}
          nodes_attribute_name: area_weight
          scaling_mask_attribute_name: cutout_mask
          weight_frac_of_total: 0.1
          norm: unit-sum
        lam_node_weights:
          _target_: anemoi.training.losses.scalers.GraphNodeAttributeScaler
          nodes_name: ${graph.data}
          nodes_attribute_name: lam_area_weight
          norm: unit-sum
        limited_area_mask:
          _target_: anemoi.training.losses.scalers.GraphNodeAttributeScaler
          nodes_name: ${graph.data}
          nodes_attribute_name: cutout_mask
          norm: null
        outside_lam_mask:
          _target_: anemoi.training.losses.scalers.GraphNodeAttributeScaler
          nodes_name: ${graph.data}
          nodes_attribute_name: boundary_mask
          norm: null
  run_id: null
  fork_run_id: 1e54fd8d071a4ccd8e68cc3d3c6ac439
  load_weights_only: true
  transfer_learning: false
  deterministic: false
  precision: 16-mixed
  multistep_input: 2
  accum_grad_batches: 1
  num_sanity_val_steps: 6
  gradient_clip:
    val: 32.0
    algorithm: value
  swa:
    enabled: false
    lr: 0.0001
  optimizer:
    _target_: torch.optim.AdamW
    betas:
    - 0.9
    - 0.95
    weight_decay: 0.1
  model_task: anemoi.training.train.tasks.GraphForecaster
  strategy:
    _target_: anemoi.training.distributed.strategy.DDPGroupStrategy
    num_gpus_per_model: ${system.hardware.num_gpus_per_model}
    read_group_size: ${dataloader.read_group_size}
  loss_gradient_scaling: false
  training_loss:
    datasets:
      data:
        _target_: anemoi.training.losses.MSELoss
        scalers:
        - general_variable
        - nan_mask_weights
        - node_weights
        ignore_nans: false
  validation_metrics:
    datasets:
      data:
        mse:
          _target_: anemoi.training.losses.MSELoss
          scalers:
          - node_weights
          ignore_nans: true
        mse_inside_lam_contribution:
          _target_: anemoi.training.losses.MSELoss
          scalers:
          - limited_area_mask
          - node_weights
          ignore_nans: true
        mse_outside_lam_contribution:
          _target_: anemoi.training.losses.MSELoss
          scalers:
          - outside_lam_mask
          - node_weights
          ignore_nans: true
        mse_inside_lam:
          _target_: anemoi.training.losses.MSELoss
          scalers:
          - lam_node_weights
          ignore_nans: true
  variable_groups:
    datasets:
      data:
        default: sfc
        pl:
          param:
          - gh
          - u
          - v
          - w
          - t
          - q
  metrics:
    datasets:
      data:
      - gh_500
      - t_850
      - u_850
      - v_850
  rollout:
    start: 2
    epoch_increment: 0
    max: 2
  max_epochs: 8
  max_steps: 5760
  lr:
    warmup: 100
    rate: 6.25e-06
    iterations: ${training.max_steps}
    min: 3.0e-07
  submodules_to_freeze: []
  recompile_limit: 32
config_validation: true
